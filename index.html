<!doctype html>
<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Month Report</title>
      <link rel="preconnect" href="https://fonts.googleapis.com" />
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
      <link rel="stylesheet" href="styles/framework.css" />
      <link rel="stylesheet" href="styles/styles.css" />
      <style>
         body {
            min-height: 100vh;
            background-color: var(--gray-50);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: var(--space-8) var(--space-4);
         }

         .page-header {
            text-align: center;
            margin-bottom: var(--space-10);
         }

         .page-header h1 {
            font-size: var(--font-size-3xl);
            color: var(--gray-900);
            margin-bottom: var(--space-2);
         }

         .page-header p {
            color: var(--gray-500);
            font-size: var(--font-size-base);
         }

         .card-grid {
            display: grid;
            grid-template-columns: repeat(1, minmax(0, 1fr));
            gap: var(--space-6);
            width: 100%;
            max-width: 720px;
         }

         @media (min-width: 640px) {
            .card-grid {
               grid-template-columns: repeat(3, minmax(0, 1fr));
            }
         }

         .card {
            background-color: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow);
            padding: var(--space-8) var(--space-6);
            text-align: center;
            text-decoration: none;
            color: var(--gray-800);
            transition: all var(--transition-base);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--space-3);
         }

         .card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
            border-color: var(--primary);
            text-decoration: none;
            color: var(--gray-800);
         }

         .card-number {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 9999px;
            background-color: var(--primary);
            color: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: var(--font-size-sm);
            font-weight: 600;
         }

         .card-label {
            font-size: var(--font-size-base);
            font-weight: 500;
            color: var(--gray-700);
         }

         .card-arrow {
            font-size: var(--font-size-xs);
            color: var(--gray-400);
            transition: color var(--transition-fast);
         }

         .card:hover .card-arrow {
            color: var(--primary);
         }
      </style>
   </head>
   <body>
      <header class="page-header">
         <h1>Month Report</h1>
         <p>Select a theme to view the report</p>
      </header>

      <div class="card-grid">
         <a href="theme1.html" class="card">
            <span class="card-label">Theme 1</span>
         </a>
         <a href="theme2.html" class="card">
            <span class="card-label">Theme 2</span>
         </a>
         <a href="theme3.html" class="card">
            <span class="card-label">Theme 3</span>
         </a>
      </div>
   </body>
</html>
