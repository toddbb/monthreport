<!doctype html>
<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Month Report</title>
      <link rel="preconnect" href="https://fonts.googleapis.com" />
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" />
      <style>
         *,
         *::before,
         *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
         }

         body {
            font-family: "Inter", system-ui, sans-serif;
            min-height: 100vh;
            background: #f5f5f7;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            color: #1d1d1f;
         }

         .page-header {
            text-align: center;
            margin-bottom: 3rem;
         }

         .page-header h1 {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #1d1d1f;
            margin-bottom: 0.4rem;
         }

         .page-header p {
            font-size: 0.9rem;
            color: #6e6e73;
         }

         .card-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
            width: 100%;
            max-width: 680px;
         }

         @media (min-width: 560px) {
            .card-grid {
               grid-template-columns: repeat(3, 1fr);
            }
         }

         .card {
            background: #fff;
            border: 1px solid #e5e5ea;
            border-radius: 16px;
            padding: 2rem 1.5rem;
            text-align: center;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.4rem;
            transition:
               box-shadow 0.18s ease,
               transform 0.18s ease,
               border-color 0.18s ease;
         }

         .card:hover {
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            transform: translateY(-3px);
            border-color: #0071e3;
         }

         .card-label {
            font-size: 0.95rem;
            font-weight: 600;
            color: #1d1d1f;
         }

         .card-sublabel {
            font-size: 0.78rem;
            color: #6e6e73;
         }
      </style>
   </head>
   <body>
      <header class="page-header">
         <h1>Month Report</h1>
         <p>Select a student to view the report</p>
      </header>

      <div class="card-grid">
         <a href="report.html?student=1" class="card">
            <span class="card-label">Student #1</span>
            <span class="card-sublabel">High Performing</span>
         </a>
         <a href="report.html?student=2" class="card">
            <span class="card-label">Student #2</span>
            <span class="card-sublabel">Average Performing</span>
         </a>
         <a href="report.html?student=3" class="card">
            <span class="card-label">Student #3</span>
            <span class="card-sublabel">Low Performing</span>
         </a>
      </div>
   </body>
</html>
