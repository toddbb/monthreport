<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monthly Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>

/* ── TOKENS ─────────────────────────────────────── */
:root {
  --font:        'Lexend', system-ui, sans-serif;
  --bg:          #f1f5f9;
  --surface:     #ffffff;
  --ink:         #0f172a;
  --ink-2:       #475569;
  --ink-3:       #94a3b8;
  --border:      #e2e8f0;

  --header-a:    #1e3a5f;
  --header-b:    #0f2244;

  --green:       #16a34a;
  --green-bg:    #dcfce7;
  --green-trk:   #bbf7d0;
  --green-border:#86efac;

  --yellow:      #b45309;
  --yellow-bg:   #fef3c7;
  --yellow-trk:  #fde68a;
  --yellow-border:#fcd34d;

  --red:         #dc2626;
  --red-bg:      #fee2e2;
  --red-trk:     #fecaca;
  --red-border:  #fca5a5;

  --star-on:     #f59e0b;
  --star-off:    #e2e8f0;

  --r-sm:  8px;
  --r:     14px;
  --r-lg:  20px;
  --sp:    20px;
  --max:   700px;
}

/* ── RESET ──────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--ink);
  line-height: 1.6;
  padding-bottom: 60px;
}

/* ── ANIMATIONS ─────────────────────────────────── */
@keyframes rise      { from { opacity:0; transform:translateY(16px) } to { opacity:1; transform:none } }
@keyframes barGrow   { from { width:0 } }
@keyframes starPop   { 0%{transform:scale(0)}70%{transform:scale(1.25)}100%{transform:scale(1)} }

.rise { opacity:0; animation: rise .5s ease forwards; }
.rise:nth-child(1){ animation-delay:.06s }
.rise:nth-child(2){ animation-delay:.13s }
.rise:nth-child(3){ animation-delay:.20s }
.rise:nth-child(4){ animation-delay:.27s }
.rise:nth-child(5){ animation-delay:.34s }
.rise:nth-child(6){ animation-delay:.41s }
.rise:nth-child(7){ animation-delay:.48s }

/* ── PAGE SHELL ─────────────────────────────────── */
.page { max-width: var(--max); margin: 0 auto; padding: 0 var(--sp); }

/* ── HEADER ─────────────────────────────────────── */
.header {
  background: linear-gradient(150deg, var(--header-a) 0%, var(--header-b) 100%);
  color: #fff;
  padding: 28px var(--sp) 26px;
}
.header-inner { max-width: var(--max); margin: 0 auto; }

.header-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 22px;
}
.brand { display: flex; align-items: center; gap: 12px; }
.brand-mark {
  width: 40px; height: 40px;
  border-radius: 10px;
  background: rgba(255,255,255,0.15);
  border: 1.5px solid rgba(255,255,255,0.25);
  display: flex; align-items: center; justify-content: center;
  font-size: .75rem; font-weight: 800; letter-spacing: .04em;
  flex-shrink: 0;
}
.brand-name  { font-size: 1rem; font-weight: 700; line-height: 1.2; }
.brand-sub   { font-size: .62rem; letter-spacing: .1em; text-transform: uppercase; opacity: .5; margin-top: 1px; }
.period-badge{
  font-size: .65rem; font-weight: 600; letter-spacing: .08em;
  text-transform: uppercase; opacity: .6; text-align: right; line-height: 1.8;
}

.header-student {
  display: flex; align-items: center; gap: 14px;
  padding-top: 18px;
  border-top: 1px solid rgba(255,255,255,0.12);
}
.avatar {
  width: 60px; height: 60px; border-radius: 50%;
  background: rgba(255,255,255,0.15);
  border: 2px solid rgba(255,255,255,0.3);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.avatar svg { width: 34px; height: 34px; opacity: .7; }
.student-name {
  font-size: clamp(1.5rem, 6vw, 2.1rem);
  font-weight: 800;
  line-height: 1.1;
  letter-spacing: -.01em;
  margin-bottom: 4px;
}
.student-course {
  font-size: .65rem; letter-spacing: .12em;
  text-transform: uppercase; opacity: .45; font-weight: 500;
}

/* ── SECTION ────────────────────────────────────── */
.section { margin-top: 24px; }
.sec-label {
  font-size: .6rem; font-weight: 700; letter-spacing: .2em;
  text-transform: uppercase; color: var(--ink-3); margin-bottom: 10px;
}

/* ── CARD ───────────────────────────────────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 20px;
}

/* ── COLOR HELPERS ──────────────────────────────── */
.c-green { color: var(--green); }
.c-yellow{ color: var(--yellow); }
.c-red   { color: var(--red); }

.bg-green { background: var(--green-bg); border-color: var(--green-border); }
.bg-yellow{ background: var(--yellow-bg); border-color: var(--yellow-border); }
.bg-red   { background: var(--red-bg);   border-color: var(--red-border); }

/* ── ATTENDANCE ─────────────────────────────────── */
.att-card {
  border-radius: var(--r);
  border: 1.5px solid;
  padding: 18px 20px;
  display: flex;
  align-items: center;
  gap: 18px;
}
.att-num { font-size: 3.2rem; font-weight: 800; line-height: 1; flex-shrink: 0; }
.att-right { flex: 1; min-width: 0; }
.att-lbl {
  font-size: .65rem; font-weight: 700;
  letter-spacing: .12em; text-transform: uppercase; margin-bottom: 6px;
}
.att-track {
  height: 7px; border-radius: 99px; overflow: hidden; margin-bottom: 7px;
}
.att-fill {
  height: 100%; border-radius: 99px;
  animation: barGrow 1s cubic-bezier(.4,0,.2,1) .3s both;
}
.att-msg { font-size: .8rem; font-weight: 600; }

/* ── OUTCOMES / SKILLS ──────────────────────────── */
.skills-list { border-radius: var(--r); overflow: hidden; border: 1px solid var(--border); }
.skill-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.skill-row:last-child { border-bottom: none; }
.skill-name {
  width: 80px; flex-shrink: 0;
  font-size: .8rem; font-weight: 600; color: var(--ink-2);
}
.skill-track { flex: 1; height: 9px; border-radius: 99px; overflow: hidden; }
.skill-fill {
  height: 100%; border-radius: 99px;
  animation: barGrow 1s cubic-bezier(.4,0,.2,1) .5s both;
}
.skill-val  { font-size: 1rem; font-weight: 800; width: 34px; text-align: right; flex-shrink: 0; }
.skill-max  { font-size: .6rem; color: var(--ink-3); width: 26px; flex-shrink: 0; }

/* ── PRACTICE (HW + VOCAB) ──────────────────────── */
.practice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.p-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 18px 14px 16px;
  display: flex; flex-direction: column; align-items: center; text-align: center;
}
.p-title {
  align-self: flex-start;
  font-size: .6rem; font-weight: 700; letter-spacing: .14em;
  text-transform: uppercase; color: var(--ink-3); margin-bottom: 14px;
}
.donut-wrap { position: relative; width: 112px; height: 112px; margin-bottom: 12px; }
.donut-svg  { width: 112px; height: 112px; transform: rotate(-90deg); }
.donut-trk  { fill: none; stroke-width: 10; }
.donut-fill {
  fill: none; stroke-width: 10; stroke-linecap: round;
  stroke-dasharray: 283;
  stroke-dashoffset: 283;
  transition: stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1) .3s;
}
.donut-center {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.donut-score { font-size: 1.8rem; font-weight: 800; line-height: 1; }
.donut-unit  { font-size: .58rem; color: var(--ink-3); margin-top: 2px; }
.p-completion{
  font-size: .73rem; color: var(--ink-2); line-height: 1.6; font-weight: 500;
}
.p-completion strong { display: block; font-size: .95rem; font-weight: 800; color: var(--ink); }

/* ── PBL ────────────────────────────────────────── */
.pbl-note {
  font-size: .78rem; color: var(--ink-3); margin-bottom: 14px; line-height: 1.5;
}
.pbl-row {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 0; border-bottom: 1px solid var(--border);
}
.pbl-row:last-child { border-bottom: none; }
.pbl-name { flex: 1; font-size: .84rem; font-weight: 600; }
.pbl-stars { display: flex; gap: 2px; }
.pbl-star {
  width: 16px; height: 16px; flex-shrink: 0;
  transition: fill .15s;
}
.pbl-star.on { animation: starPop .3s ease both; }
.pbl-star.on:nth-child(1){ animation-delay:.50s }
.pbl-star.on:nth-child(2){ animation-delay:.58s }
.pbl-star.on:nth-child(3){ animation-delay:.66s }
.pbl-star.on:nth-child(4){ animation-delay:.74s }
.pbl-star.on:nth-child(5){ animation-delay:.82s }
.pbl-num { font-size: .68rem; color: var(--ink-3); width: 22px; text-align: right; flex-shrink: 0; }

/* ── TESTS ──────────────────────────────────────── */
.tests-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.test-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 16px 14px;
}
.test-title {
  font-size: .6rem; font-weight: 700; letter-spacing: .14em;
  text-transform: uppercase; color: var(--ink-3); margin-bottom: 14px;
}
.test-row { margin-bottom: 12px; }
.test-row:last-child { margin-bottom: 0; }
.test-row-top {
  display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px;
}
.test-lbl  { font-size: .75rem; color: var(--ink-2); }
.test-val  { font-size: .95rem; font-weight: 800; }
.test-track{ height: 6px; border-radius: 99px; overflow: hidden; }
.test-fill {
  height: 100%; border-radius: 99px;
  animation: barGrow 1s cubic-bezier(.4,0,.2,1) .65s both;
}

/* ── TEAM ───────────────────────────────────────── */
.team-group { margin-bottom: 14px; }
.team-group:last-child { margin-bottom: 0; }
.team-group-label {
  font-size: .58rem; letter-spacing: .18em; text-transform: uppercase;
  color: var(--ink-3); margin-bottom: 10px;
}
.team-members { display: flex; flex-wrap: wrap; gap: 10px; }
.team-member  { display: flex; align-items: center; gap: 8px; }
.team-init {
  width: 32px; height: 32px; border-radius: 50%;
  background: #dbeafe; border: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: .62rem; font-weight: 800; color: #1d4ed8; flex-shrink: 0;
}
.team-name { font-size: .8rem; color: var(--ink-2); font-weight: 500; }

/* ── FOOTER ─────────────────────────────────────── */
.footer {
  display: flex; justify-content: space-between; flex-wrap: wrap; gap: 6px;
  margin-top: 36px; padding-top: 18px; border-top: 1px solid var(--border);
}
.footer span { font-size: .62rem; color: var(--ink-3); letter-spacing: .05em; }

/* ── RESPONSIVE ─────────────────────────────────── */
@media (max-width: 420px) {
  .practice-grid { grid-template-columns: 1fr; }
  .tests-grid    { grid-template-columns: 1fr; }
  .att-num       { font-size: 2.6rem; }
}
@media (min-width: 560px) {
  .header { padding: 36px 28px 32px; }
  .card   { padding: 24px; }
}
@media (min-width: 700px) {
  .student-name { font-size: 2.3rem; }
}

.hidden { display: none !important; }

</style>
</head>
<body>

<!-- ═══════════════ HEADER ═══════════════ -->
<header class="header">
  <div class="header-inner">
    <div class="header-top">
      <div class="brand">
        <div class="brand-mark">ILA</div>
        <div>
          <div class="brand-name">Language School</div>
          <div class="brand-sub">English for Young Learners</div>
        </div>
      </div>
      <div class="period-badge">Monthly Report<br><span id="hdr-period"></span></div>
    </div>

    <div class="header-student">
      <div class="avatar">
        <svg viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="8" r="4" fill="white"/>
          <path d="M4 20c0-4 3.58-7 8-7s8 3 8 7" fill="white" opacity=".65"/>
        </svg>
      </div>
      <div>
        <div class="student-name" id="hdr-name"></div>
        <div class="student-course" id="hdr-course"></div>
      </div>
    </div>
  </div>
</header>

<div class="page">

  <!-- ═══════════════ ATTENDANCE ═══════════════ -->
  <div class="section rise" id="sec-att">
    <div class="sec-label">Attendance</div>
    <div class="att-card" id="att-card">
      <div class="att-num" id="att-num"></div>
      <div class="att-right">
        <div class="att-lbl" id="att-lbl">Classes attended this month</div>
        <div class="att-track" id="att-track">
          <div class="att-fill" id="att-fill"></div>
        </div>
        <div class="att-msg" id="att-msg"></div>
      </div>
    </div>
  </div>

  <!-- ═══════════════ LANGUAGE SKILLS ═══════════════ -->
  <div class="section rise" id="sec-outcomes">
    <div class="sec-label">Language Skills</div>
    <div class="skills-list" id="skills-list"></div>
  </div>

  <!-- ═══════════════ PRACTICE ═══════════════ -->
  <div class="section rise" id="sec-practice">
    <div class="sec-label">Practice &amp; Homework</div>
    <div class="practice-grid" id="practice-grid"></div>
  </div>

  <!-- ═══════════════ PROJECT SKILLS (PBL) ═══════════════ -->
  <div class="section rise" id="sec-pbl">
    <div class="sec-label">Project Skills</div>
    <div class="card">
      <p class="pbl-note">How your child approaches teamwork, creativity and independent thinking during class projects.</p>
      <div id="pbl-rows"></div>
    </div>
  </div>

  <!-- ═══════════════ TEST RESULTS ═══════════════ -->
  <div class="section rise" id="sec-tests">
    <div class="sec-label">Test Results</div>
    <div class="tests-grid" id="tests-grid"></div>
  </div>

  <!-- ═══════════════ TEACHING TEAM ═══════════════ -->
  <div class="section rise" id="sec-team">
    <div class="sec-label">Your Child's Teaching Team</div>
    <div class="card">
      <div id="grp-teachers"></div>
      <div id="grp-tas"></div>
    </div>
  </div>

  <!-- ═══════════════ FOOTER ═══════════════ -->
  <div class="footer rise">
    <span id="ftr-course"></span>
    <span id="ftr-date"></span>
  </div>

</div><!-- /page -->

<script>
/* ════════════════════════════════════════════
   DATA  — update this object each month
════════════════════════════════════════════ */
const DATA = {
  STUDENT_NAME:  "Bui My Hang",
  COURSE_CODE:   "H99YJ-1A-2601",
  DATE_RANGE:    { start: "01/03/2026", end: "31/03/2026" },
  TEACHERS:      ["David Franklin", "Nguyen Mai Thi"],
  TAS:           ["Pham Trinh Tu", "Dao Khoi Anh", "Trinh Trieu Thanh"],
  ATTENDANCE:    97,
  OUTCOMES:      { reading: 4.2, writing: 3.8, speaking: 3.5, listening: 4.6 },
  HOMEWORK:      { average_score: 84, completion_rate: 92 },
  VOCABULARY:    { average_score: 94, completion_rate: 67 },
  PBL:           { creativity: 5, collaboration: 4, critical_thinking: 4, communication: 5, self_reflection: 4, digital_literacy: 3 },
  CAMBRIDGE:     { reading_writing: 87, speaking: 92, listening: 74 },
  PROGRESS_TEST: { reading_writing_grammar_vocabulary: 89, speaking: 92, listening: 72 }
};

/* ── Utilities ───────────────────────────────── */
const $ = id => document.getElementById(id);

function blank(v) {
  if (v === null || v === undefined || v === "") return true;
  if (typeof v === "object" && !Array.isArray(v))
    return Object.values(v).every(x => x === null || x === undefined || x === "");
  return false;
}

function num(v) { const n = parseFloat(v); return isNaN(n) ? null : n; }

function initials(name) {
  return name.trim().split(/\s+/).map(w => w[0]).join("").toUpperCase().slice(0, 2);
}

function fmtDate(s) {
  const [d, m, y] = s.split("/");
  return `${parseInt(d)} ${["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][+m-1]} ${y}`;
}

function monthName(dr) {
  if (!dr) return "";
  const [, m, y] = dr.start.split("/");
  return `${["January","February","March","April","May","June","July","August","September","October","November","December"][+m-1]} ${y}`;
}

/* ── Colour logic (0–100 scale) ──────────────── */
function col(pct) {
  if (pct >= 80) return { cls:"c-green",  bg:"bg-green",  fill:"var(--green)",  trk:"var(--green-trk)"  };
  if (pct >= 60) return { cls:"c-yellow", bg:"bg-yellow", fill:"var(--yellow)", trk:"var(--yellow-trk)" };
  return               { cls:"c-red",    bg:"bg-red",    fill:"var(--red)",    trk:"var(--red-trk)"    };
}

/* ── PBL star colour (1–5 scale) ─────────────── */
function starFill(score) {
  if (score >= 4) return "var(--star-on)";
  if (score >= 3) return "#fb923c";
  return "var(--red)";
}

/* ── Donut chart (r=45, circ≈283) ───────────── */
const CIRC = 282.74;

function buildDonut(score, idSuffix) {
  const pct = Math.min(100, Math.max(0, num(score) ?? 0));
  const c   = col(pct);
  return `
    <div class="donut-wrap">
      <svg class="donut-svg" viewBox="0 0 110 110">
        <circle class="donut-trk" cx="55" cy="55" r="45" stroke="${c.trk}"/>
        <circle class="donut-fill" id="df-${idSuffix}" cx="55" cy="55" r="45" stroke="${c.fill}"/>
      </svg>
      <div class="donut-center">
        <div class="donut-score ${c.cls}">${Math.round(pct)}</div>
        <div class="donut-unit">/ 100</div>
      </div>
    </div>`;
}

function animateDonut(idSuffix, pct) {
  const el = $("df-" + idSuffix);
  if (el) el.style.strokeDashoffset = CIRC - (pct / 100) * CIRC;
}

/* ════════════════════════════════════════════
   RENDER
════════════════════════════════════════════ */
function render() {
  const d = DATA;

  /* Header */
  $("hdr-name").textContent   = d.STUDENT_NAME || "";
  $("hdr-course").textContent = d.COURSE_CODE  || "";
  if (d.DATE_RANGE) {
    $("hdr-period").textContent = `${fmtDate(d.DATE_RANGE.start)} – ${fmtDate(d.DATE_RANGE.end)}`;
    document.title = `${monthName(d.DATE_RANGE)} Report – ${d.STUDENT_NAME}`;
  }

  /* Attendance */
  if (!blank(d.ATTENDANCE)) {
    const pct  = num(d.ATTENDANCE);
    const c    = col(pct);
    $("att-card").classList.add(c.bg);
    $("att-num").textContent            = pct + "%";
    $("att-num").className              = "att-num " + c.cls;
    $("att-lbl").className              = "att-lbl " + c.cls;
    $("att-fill").style.width           = pct + "%";
    $("att-fill").style.background      = c.fill;
    $("att-track").style.background     = c.trk;
    $("att-msg").className              = "att-msg " + c.cls;
    $("att-msg").textContent            = pct >= 95 ? "Outstanding attendance this month! 🌟"
                                        : pct >= 85 ? "Great attendance — well done!"
                                        : pct >= 75 ? "Good, but let's aim a little higher!"
                                        :             "Attendance needs attention. Please contact us.";
  } else {
    $("sec-att").classList.add("hidden");
  }

  /* Language Skills */
  if (!blank(d.OUTCOMES)) {
    const labels = { reading:"Reading", writing:"Writing", speaking:"Speaking", listening:"Listening" };
    let html = "";
    for (const [key, lbl] of Object.entries(labels)) {
      const v = d.OUTCOMES[key];
      if (v === null || v === undefined || v === "") continue;
      const score = num(v);
      const pct   = (score / 5) * 100;
      const c     = col(pct);
      html += `
        <div class="skill-row">
          <div class="skill-name">${lbl}</div>
          <div class="skill-track" style="background:${c.trk}">
            <div class="skill-fill" style="width:${pct}%; background:${c.fill}"></div>
          </div>
          <div class="skill-val ${c.cls}">${score.toFixed(1)}</div>
          <div class="skill-max">/ 5.0</div>
        </div>`;
    }
    $("skills-list").innerHTML = html;
    if (!html) $("sec-outcomes").classList.add("hidden");
  } else {
    $("sec-outcomes").classList.add("hidden");
  }

  /* Practice (Homework + Vocabulary) */
  const hw   = d.HOMEWORK;
  const vcb  = d.VOCABULARY;
  const hwOk = !blank(hw);
  const vOk  = !blank(vcb);

  if (!hwOk && !vOk) {
    $("sec-practice").classList.add("hidden");
  } else {
    const grid = $("practice-grid");
    if (!hwOk || !vOk) grid.style.gridTemplateColumns = "1fr";

    function practiceCard(obj, title, suffix) {
      const score = num(obj.average_score);
      const comp  = num(obj.completion_rate);
      const cS    = score != null ? col(score) : col(0);
      const cC    = comp  != null ? col(comp)  : col(0);
      return `
        <div class="p-card">
          <div class="p-title">${title}</div>
          ${score != null ? buildDonut(score, suffix) : ""}
          ${comp  != null ? `
            <hr style="width:100%;border:none;border-top:1px solid var(--border);margin:4px 0 10px">
            <div class="p-completion">
              Completion rate<br>
              <strong class="${cC.cls}">${comp}%</strong>
            </div>` : ""}
        </div>`;
    }

    grid.innerHTML =
      (hwOk ? practiceCard(hw,  "Homework",   "hw")    : "") +
      (vOk  ? practiceCard(vcb, "Vocabulary", "vocab") : "");

    requestAnimationFrame(() => setTimeout(() => {
      if (hwOk && hw.average_score  != null) animateDonut("hw",    num(hw.average_score));
      if (vOk  && vcb.average_score != null) animateDonut("vocab", num(vcb.average_score));
    }, 150));
  }

  /* PBL */
  if (!blank(d.PBL)) {
    const labels = {
      creativity:"Creativity", collaboration:"Collaboration",
      critical_thinking:"Critical Thinking", communication:"Communication",
      self_reflection:"Self-Reflection", digital_literacy:"Digital Literacy"
    };
    const PATH = `<path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>`;
    let html = "";
    for (const [key, lbl] of Object.entries(labels)) {
      const v = d.PBL[key];
      if (v === null || v === undefined || v === "") continue;
      const score = Math.round(num(v));
      const fill  = starFill(score);
      let stars = "";
      for (let i = 1; i <= 5; i++) {
        stars += `<svg class="pbl-star${i <= score ? " on" : ""}" viewBox="0 0 24 24" fill="${i <= score ? fill : "var(--star-off)"}">${PATH}</svg>`;
      }
      html += `
        <div class="pbl-row">
          <div class="pbl-name">${lbl}</div>
          <div class="pbl-stars">${stars}</div>
          <div class="pbl-num">${score}/5</div>
        </div>`;
    }
    $("pbl-rows").innerHTML = html;
    if (!html) $("sec-pbl").classList.add("hidden");
  } else {
    $("sec-pbl").classList.add("hidden");
  }

  /* Test Results */
  const camb = d.CAMBRIDGE;
  const prog = d.PROGRESS_TEST;
  const cOk  = !blank(camb);
  const pOk  = !blank(prog);

  if (!cOk && !pOk) {
    $("sec-tests").classList.add("hidden");
  } else {
    const grid = $("tests-grid");
    if (!cOk || !pOk) grid.style.gridTemplateColumns = "1fr";

    function testCard(obj, title, rowDefs) {
      let rows = "";
      for (const [key, lbl] of rowDefs) {
        const v = obj[key];
        if (v === null || v === undefined || v === "") continue;
        const score = num(v);
        const c = col(score);
        rows += `
          <div class="test-row">
            <div class="test-row-top">
              <span class="test-lbl">${lbl}</span>
              <span class="test-val ${c.cls}">${score}</span>
            </div>
            <div class="test-track" style="background:${c.trk}">
              <div class="test-fill" style="width:${score}%; background:${c.fill}"></div>
            </div>
          </div>`;
      }
      return rows ? `<div class="test-card"><div class="test-title">${title}</div>${rows}</div>` : "";
    }

    grid.innerHTML =
      (cOk ? testCard(camb, "Cambridge Test", [
        ["reading_writing","Reading & Writing"],
        ["speaking","Speaking"],
        ["listening","Listening"]
      ]) : "") +
      (pOk ? testCard(prog, "Progress Test", [
        ["reading_writing_grammar_vocabulary","Reading, Writing & Grammar"],
        ["speaking","Speaking"],
        ["listening","Listening"]
      ]) : "");
  }

  /* Teaching Team */
  function buildTeamGroup(members, containerId, label) {
    const el = $(containerId);
    if (!members || !members.length) { el.classList.add("hidden"); return; }
    let html = `<div class="team-group-label">${label}</div><div class="team-members">`;
    for (const name of members) {
      html += `<div class="team-member"><div class="team-init">${initials(name)}</div><div class="team-name">${name}</div></div>`;
    }
    el.innerHTML = html + "</div>";
  }

  buildTeamGroup(d.TEACHERS, "grp-teachers", "Teachers");
  buildTeamGroup(d.TAS,      "grp-tas",      "Teaching Assistants");
  if ((!d.TEACHERS || !d.TEACHERS.length) && (!d.TAS || !d.TAS.length))
    $("sec-team").classList.add("hidden");

  /* Footer */
  $("ftr-course").textContent = d.COURSE_CODE  ? `Course ${d.COURSE_CODE}` : "";
  $("ftr-date").textContent   = d.DATE_RANGE   ? `${monthName(d.DATE_RANGE)} Report` : "Monthly Report";
}

render();
</script>
</body>
</html>
